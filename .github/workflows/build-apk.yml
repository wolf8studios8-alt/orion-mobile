name: Build Android APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        run: |
          git clone https://github.com/wolf8studios8-alt/orion-mobile.git .

      - name: Set up Python
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip

      - name: Install dependencies
        run: |
          pip install buildozer cython
          pip install -r requirements_mobile.txt

      - name: Install Android build tools
        run: |
          sudo apt-get install -y openjdk-11-jdk-headless libtool autoconf

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: List APK files
        run: |
          ls -la bin/
